<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best 5 | خيارك الأمثل</title>
    <meta
      name="description"
      content="اكتشف أفضل 5 أماكن وخدمات في تركيا مع Best5، مقارنات موثوقة وتقييمات محدثة تساعدك اختيار الأفضل بسهولة."
    />
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var segment = window.location.pathname.split('/')[1];
          var lang = segment === 'en' ? 'en' : 'ar';
          root.setAttribute('lang', lang);
          root.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

          var key = 'besiktas_theme';
          var stored = window.localStorage.getItem(key);
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'dark' || (stored !== 'light' && prefersDark) ? 'dark' : 'light';
          root.classList.toggle('dark', theme === 'dark');
          root.style.colorScheme = theme;
          root.setAttribute('data-theme', theme);
        } catch (_) {}
      })();
    </script>
    <link
      rel="preload"
      as="image"
      href="/images/hero-besiktas.webp"
      imagesrcset="/images/hero-besiktas-768.webp 768w, /images/hero-besiktas.webp 1200w"
      imagesizes="(max-width: 768px) 100vw, 1200px"
      fetchpriority="high"
    />
    <link rel="preload" as="style" href="/index.css" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=optional" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=optional" rel="stylesheet" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-gray-50 font-sans antialiased text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
