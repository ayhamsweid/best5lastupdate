<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best 5 | خيارك الأمثل</title>
    <meta
      name="description"
      content="اكتشف أفضل 5 أماكن وخدمات في تركيا مع Best5، مقارنات موثوقة وتقييمات محدثة تساعدك اختيار الأفضل بسهولة."
    />
    <link
      rel="preload"
      as="image"
      href="/images/hero-besiktas.webp"
      imagesrcset="/images/hero-besiktas-768.webp 768w, /images/hero-besiktas.webp 1200w"
      imagesizes="(max-width: 768px) 100vw, 1200px"
      fetchpriority="high"
    />
    <link rel="preload" as="style" href="/index.css" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
      #app-shell {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: #f8fafc;
        color: #0f172a;
        z-index: 9999;
        pointer-events: none;
      }
      .shell-header,
      .shell-footer {
        background: rgba(248, 250, 252, 0.92);
        border-bottom: 1px solid rgba(148, 163, 184, 0.25);
      }
      .shell-footer {
        border-top: 1px solid rgba(148, 163, 184, 0.2);
        border-bottom: none;
      }
      .shell-container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .shell-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .shell-logo-mark {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: #22c55e;
      }
      .shell-title {
        width: 140px;
        height: 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.35);
      }
      .shell-subtitle {
        width: 110px;
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.35);
        margin-top: 6px;
      }
      .shell-actions {
        display: flex;
        gap: 8px;
      }
      .shell-pill {
        width: 64px;
        height: 28px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.35);
      }
      .shell-main {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .shell-loader {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .shell-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #22c55e;
        animation: shellPulse 1.1s infinite ease-in-out;
      }
      .shell-dot:nth-child(2) { animation-delay: 0.15s; }
      .shell-dot:nth-child(3) { animation-delay: 0.3s; }
      .shell-footer-line {
        width: 160px;
        height: 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.35);
      }
      .shell-footer-line.short { width: 110px; }
      @keyframes shellPulse {
        0%, 100% { opacity: 0.4; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 font-sans antialiased text-gray-900">
    <div id="app-shell" aria-hidden="true">
      <header class="shell-header">
        <div class="shell-container">
          <div class="shell-logo">
            <span class="shell-logo-mark"></span>
            <div class="shell-logo-text">
              <div class="shell-title"></div>
              <div class="shell-subtitle"></div>
            </div>
          </div>
          <div class="shell-actions">
            <span class="shell-pill"></span>
            <span class="shell-pill"></span>
          </div>
        </div>
      </header>
      <main class="shell-main">
        <div class="shell-loader">
          <span class="shell-dot"></span>
          <span class="shell-dot"></span>
          <span class="shell-dot"></span>
        </div>
      </main>
      <footer class="shell-footer">
        <div class="shell-container">
          <div class="shell-footer-left">
            <div class="shell-footer-line"></div>
            <div class="shell-footer-line short"></div>
          </div>
          <div class="shell-footer-right">
            <div class="shell-footer-line"></div>
          </div>
        </div>
      </footer>
    </div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
